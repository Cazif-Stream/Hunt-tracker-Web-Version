<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Connecting to Twitch...</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #420415; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { text-align: center; background: #980a31; padding: 40px; border-radius: 10px; border: 2px solid #ffc600; }
        h1 { color: #ffc600; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Connecting to Twitch...</h1>
        <p>Redirecting back to tracker...</p>
    </div>
    <script>
        // Pass the hash (with token) to the main page
        if (window.location.hash) {
            // Works for both localhost and GitHub Pages
            window.location.href = 'index.html' + window.location.hash;
        } else {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
