<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>The Hunt - BL4 Charity 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #420415;
            --maroon: #980a31;
            --gold: #ffc600;
            --yellow: #fff8a6;
            --white: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        
        .hunt-font {
            font-family: 'Bebas Neue', Impact, 'Arial Black', sans-serif;
            letter-spacing: 2px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--dark) 0%, var(--maroon) 100%);
            padding: 12px 15px;
            border-bottom: 3px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .title {
            font-size: clamp(18px, 5vw, 28px);
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .header-stats {
            display: flex;
            gap: 15px;
        }
        
        .stat-box { text-align: center; min-width: 50px; }
        .stat-label { font-size: 10px; color: var(--yellow); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: clamp(20px, 6vw, 32px); color: var(--gold); text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        
        .header-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .player-section { display: flex; align-items: center; gap: 8px; }
        .player-label { color: var(--white); font-size: 13px; }
        .player-input {
            padding: 8px 12px;
            border: 2px solid var(--gold);
            border-radius: 5px;
            background: var(--dark);
            color: var(--white);
            font-size: 14px;
            width: 130px;
        }
        
        .timer-section { display: flex; align-items: center; gap: 8px; }
        .timer-display { font-size: clamp(18px, 5vw, 26px); color: var(--white); min-width: 85px; }
        
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            touch-action: manipulation;
            transition: transform 0.1s, opacity 0.1s;
        }
        
        .btn:active { transform: scale(0.95); }
        .btn-start { background: #2e7d32; color: var(--white); }
        .btn-stop { background: #c62828; color: var(--white); }
        .btn-reset { background: var(--maroon); color: var(--white); border: 1px solid var(--gold); }
        
        .tabs {
            display: none;
            background: var(--maroon);
            border-bottom: 2px solid var(--gold);
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--yellow);
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        
        .tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
            background: rgba(255,198,0,0.1);
        }
        
        @media (max-width: 768px) {
            .tabs { display: flex; }
        }
        
        .main {
            display: flex;
            gap: 20px;
            padding: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        @media (max-width: 768px) {
            .main { flex-direction: column; padding: 10px; gap: 0; }
            .panel { border-radius: 0; margin: 0; }
            .panel.hidden { display: none; }
        }
        
        .panel {
            background: var(--maroon);
            border-radius: 10px;
            padding: 15px;
            border: 2px solid var(--gold);
        }
        
        .panel-title {
            font-size: clamp(16px, 4vw, 20px);
            color: var(--gold);
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--gold);
        }
        
        .items-panel { flex: 1; min-width: 0; }
        
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search {
            flex: 1;
            min-width: 150px;
            padding: 10px 12px;
            border: 2px solid var(--gold);
            border-radius: 5px;
            background: var(--dark);
            color: var(--white);
            font-size: 14px;
        }
        
        .search::placeholder { color: var(--yellow); opacity: 0.7; }
        
        .select {
            padding: 10px 8px;
            border: 2px solid var(--gold);
            border-radius: 5px;
            background: var(--dark);
            color: var(--white);
            font-size: 13px;
            min-width: 100px;
        }
        
        .items-scroll {
            max-height: 55vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: var(--dark);
            border: 1px solid var(--gold);
        }
        
        @media (max-width: 768px) {
            .items-scroll { max-height: 60vh; }
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        
        th {
            background: var(--maroon);
            color: var(--gold);
            padding: 10px 8px;
            text-align: left;
            position: sticky;
            top: 0;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gold);
        }
        
        td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,198,0,0.2);
            vertical-align: middle;
            color: var(--white);
            background: var(--dark);
        }
        
        tr:hover td { background: rgba(255,198,0,0.1); }
        tr.collected td { background: rgba(46,125,50,0.3); color: #81c784; }
        .item-name { color: var(--white); font-weight: normal; }
        
        .record-btn {
            padding: 8px 14px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            touch-action: manipulation;
            white-space: nowrap;
        }
        
        .record-btn:active { background: var(--yellow); }
        
        @media (max-width: 600px) {
            .hide-mobile { display: none; }
            td, th { padding: 8px 5px; font-size: 12px; }
        }
        
        .drops-panel { width: 380px; flex-shrink: 0; }
        
        @media (max-width: 768px) {
            .drops-panel { width: 100%; }
        }
        
        .drops-scroll {
            background: var(--dark);
            border: 1px solid var(--gold);
            padding: 10px;
        }
        
        .drops-header {
            display: flex;
            background: var(--maroon);
            border-bottom: 1px solid var(--gold);
            font-size: 11px;
            font-weight: bold;
            color: var(--gold);
            text-transform: uppercase;
        }
        
        .drops-header span { padding: 8px 5px; }
        .drops-header .col-session { width: 60px; }
        .drops-header .col-item { flex: 1; }
        .drops-header .col-boss { flex: 1; }
        .drops-header .col-pts { width: 40px; text-align: center; }
        
        .drops-list {
            max-height: 300px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .drop-row {
            display: flex;
            align-items: center;
            padding: 8px 5px;
            border-bottom: 1px solid rgba(255,198,0,0.2);
            font-size: 12px;
            cursor: pointer;
        }
        
        .drop-row:hover { background: rgba(255,198,0,0.1); }
        .drop-row .col-session { width: 60px; color: var(--white); }
        .drop-row .col-item { flex: 1; color: var(--gold); font-weight: bold; }
        .drop-row .col-boss { flex: 1; color: var(--white); }
        .drop-row .col-pts { width: 40px; text-align: center; color: var(--white); }
        
        .clip-section {
            margin-top: 10px;
            padding: 10px;
            background: var(--dark);
            border: 1px solid var(--gold);
        }
        
        .clip-title { color: var(--gold); font-size: 12px; margin-bottom: 8px; font-weight: bold; }
        .clip-row { display: flex; gap: 6px; margin-bottom: 8px; }
        
        .clip-input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid var(--gold);
            border-radius: 4px;
            background: var(--maroon);
            color: var(--white);
            font-size: 12px;
        }
        
        .clip-btn {
            padding: 8px 12px;
            background: #9146ff;
            color: var(--white);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        
        .twitch-section {
            margin-bottom: 12px;
            padding: 10px;
            background: var(--dark);
            border: 1px solid var(--gold);
        }
        
        .twitch-btn {
            width: 100%;
            padding: 12px 20px;
            background: #9146ff;
            color: var(--white);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .twitch-connected { color: #4caf50; text-align: center; font-weight: bold; }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--gold);
        }
        
        .action-btn {
            flex: 1;
            padding: 12px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .action-btn:disabled { background: #666; color: #999; cursor: not-allowed; }
        .action-btn.remove { background: var(--maroon); color: var(--gold); border: 1px solid var(--gold); }
        
        .warning { color: #ff9800; font-size: 12px; margin-top: 8px; text-align: center; }
        
        .export-section { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        
        .export-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            background: var(--dark);
            color: var(--yellow);
            border: 1px solid var(--gold);
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        
        .export-btn.import { background: var(--gold); color: var(--dark); }
        
        .no-drops { color: var(--yellow); text-align: center; padding: 30px 20px; font-style: italic; }
        
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal {
            background: var(--maroon);
            border: 3px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            max-width: 450px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-title { font-size: 20px; color: var(--gold); margin-bottom: 15px; }
        .source-list { max-height: 200px; overflow-y: auto; margin: 10px 0; }
        
        .source-option {
            padding: 12px;
            margin: 6px 0;
            background: var(--dark);
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .source-option:active, .source-option.selected {
            border-color: var(--gold);
            background: rgba(255,198,0,0.15);
        }
        
        .source-name { color: var(--gold); font-weight: bold; }
        .source-location { color: var(--white); font-size: 12px; }
        
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        
        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        
        .modal-btn.primary { background: var(--gold); color: var(--dark); }
        .modal-btn.secondary { background: var(--dark); color: var(--white); border: 1px solid var(--gold); }
        
        .import-info { color: var(--yellow); font-size: 12px; margin-top: 10px; }
        .import-preview { background: var(--dark); padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 12px; }
        .import-preview strong { color: var(--gold); }
        
        /* Hidden file input */
        .file-input { display: none; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }
    </style>
</head>

        } else {
            const total = submitList.length;
            const done = submitList.filter((d, i) => i <= submitIndex && claimed || i < submitIndex).length;
            setSubmitMode(false);
            setSubmitList([]);
            setSubmitIndex(0);
        }
    };
    
    const cancelSubmit = () => {
        setSubmitMode(false);
        setSubmitList([]);
        setSubmitIndex(0);
    };
    
    const exportJSON = () => {
        const blob = new Blob([JSON.stringify({ player, score, seconds, drops, exported: new Date().toISOString() }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `hunt_${player || 'session'}_${Date.now()}.json`; a.click();
    };
    
    const exportCSV = () => {
        const csv = [['Item','Boss','Type','Points','Time','Clip','Submitted','Timestamp'], ...drops.map(d => [d.itemName,d.bossName,d.type,d.points,formatTime(d.sessionTime),d.clipUrl,d.submitted?'Yes':'No',d.timestamp])].map(r => r.join(',')).join('\n');
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = `hunt_${player || 'session'}_${Date.now()}.csv`; a.click();
    };
    
    const clearAll = () => { 
        if (confirm('Clear all data? This cannot be undone!')) { 
            setDrops([]); 
            setSeconds(0); 
            setRunning(false); 
            setSelectedDrop(null); 
        } 
    };
    
    // Import functionality
    const handleImportClick = () => {
        fileInputRef.current?.click();
    };
    
    const handleFileSelect = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const data = JSON.parse(event.target.result);
                // Normalize Drops field (desktop uses capital D)
                if (data.Drops && !data.drops) {
                    data.drops = data.Drops;
                }
                // Validate it has drops
                if (!data.drops || !Array.isArray(data.drops)) {
                    alert('Invalid backup file: no drops found');
                    return;
                }
                setImportModal(data);
            } catch (err) {
                alert('Error reading file: ' + err.message);
            }
        };
        reader.readAsText(file);
        e.target.value = ''; // Reset so same file can be selected again
    };
    
    const confirmImport = (mode) => {
        if (!importModal) return;
        
        // Normalize field names from desktop app (PascalCase/snake_case) to web (camelCase)
        const importedDrops = importModal.drops.map((d, i) => ({
            id: d.id || Date.now() + i,
            itemName: d.itemName || d.ItemName || d.item_name || '',
            bossName: d.bossName || d.BossName || d.boss_name || '',
            type: d.type || d.Type || '',
            points: d.points || d.Points || 1,
            timestamp: d.timestamp || d.Timestamp || new Date().toISOString(),
            sessionTime: d.sessionTime || d.SessionTime || d.session_time || 0,
            clipUrl: d.clipUrl || d.ClipUrl || d.clip_url || '',
            submitted: d.submitted || d.Submitted || false
        }));
        
        const clipsImported = importedDrops.filter(d => d.clipUrl).length;
        
        if (mode === 'replace') {
            setDrops(importedDrops);
            setSeconds(importModal.seconds || importModal.timerSeconds || importModal.TimerSeconds || 0);
            if (importModal.player || importModal.Player || importModal.PlayerName) {
                setPlayer(importModal.player || importModal.Player || importModal.PlayerName);
            }
        } else {
            // Merge - add imported drops
            setDrops(prev => [...prev, ...importedDrops]);
            setSeconds(s => s + (importModal.seconds || importModal.timerSeconds || importModal.TimerSeconds || 0));
        }
        
        setImportModal(null);
        setActiveTab('drops');
        alert(`Imported ${importedDrops.length} drops!${clipsImported > 0 ? '\\n' + clipsImported + ' with clips attached.' : ''}`);
    };
    
    const currentDrop = drops.find(d => d.id === selectedDrop);

    return (
        <div>
            <input 
                type="file" 
                ref={fileInputRef} 
                className="file-input" 
                accept=".json"
                onChange={handleFileSelect}
            />
            
            <header className="header">
                <div className="header-top">
                    <div style={{display: 'flex', alignItems: 'center', gap: '15px'}}>
                        <img 
                            src="logo.png" 
                            alt="Hunt Logo" 
                            style={{width: '60px', height: '60px', borderRadius: '50%', border: '2px solid var(--gold)'}}
                            onError={(e) => e.target.style.display = 'none'}
                        />
                        <div>
                            <h1 className="title hunt-font">THE HUNT - BL4 CHARITY 2026</h1>
                            <a 
                                href="https://thehuntbl4.com" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                style={{color: 'var(--yellow)', fontSize: '12px', textDecoration: 'none'}}
                            >
                                🌐 thehuntbl4.com
                            </a>
                        </div>
                    </div>
                    <button 
                        onClick={() => setShowHelp(true)}
                        style={{
                            background: 'var(--gold)',
                            color: 'var(--dark)',
                            border: 'none',
                            borderRadius: '50%',
                            width: '30px',
                            height: '30px',
                            fontSize: '16px',
                            cursor: 'pointer',
                            fontWeight: 'bold'
                        }}
                    >?</button>
                    <div className="header-stats">
                        <div className="stat-box">
                            <div className="stat-label">Score</div>
                            <div className="stat-value hunt-font">{score}</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">Drops Left</div>
                            <div className="stat-value hunt-font">{197 - uniqueCollected.size}</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">Collected</div>
                            <div className="stat-value hunt-font">{drops.length} / 197</div>
                        </div>
                    </div>
                </div>
                <div className="header-bottom">
                    <div className="player-section">
                        <span className="player-label">Player:</span>
                        <input className="player-input" placeholder="Your name" value={player} onChange={e => setPlayer(e.target.value)} />
                    </div>
                    <div className="timer-section">
                        <span style={{color: 'var(--white)', marginRight: '5px'}}>SESSION:</span>
                        <div className="timer-display hunt-font">{formatTime(seconds)}</div>
                        {!running 
                            ? <button className="btn btn-start" onClick={() => setRunning(true)}>START</button>
                            : <button className="btn btn-stop" onClick={() => setRunning(false)}>STOP</button>
                        }
                        <button className="btn btn-reset" onClick={() => { setSeconds(0); setRunning(false); }}>Reset</button>
                    </div>
                </div>
            </header>
            
            <div className="tabs">
                <button className={`tab ${activeTab === 'items' ? 'active' : ''}`} onClick={() => setActiveTab('items')}>
                    Drop Tracking
                </button>
                <button className={`tab ${activeTab === 'drops' ? 'active' : ''}`} onClick={() => setActiveTab('drops')}>
                    Clips ({drops.length})
                </button>
                <button className={`tab ${activeTab === 'submit' ? 'active' : ''}`} onClick={() => setActiveTab('submit')}>
                    Submit
                </button>
            </div>
            
            <div className="main">
                <div className={`panel items-panel ${activeTab !== 'items' ? 'hidden' : ''}`}>
                    <div className="filters">
                        <span style={{color: 'var(--white)'}}>Search:</span>
                        <input className="search" value={search} onChange={e => setSearch(e.target.value)} />
                        <span style={{color: 'var(--white)'}}>Type:</span>
                        <select className="select" value={typeFilter} onChange={e => setTypeFilter(e.target.value)}>
                            <option value="All">All</option>
                            {types.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                        <span className="hide-mobile" style={{color: 'var(--white)'}}>Mode:</span>
                        <select className="select hide-mobile" value={modeFilter} onChange={e => setModeFilter(e.target.value)}>
                            <option value="All">All</option>
                            {modes.map(m => <option key={m} value={m}>{m}</option>)}
                        </select>
                        <span style={{color: 'var(--white)'}}>Boss:</span>
                        <select className="select" value={bossFilter} onChange={e => setBossFilter(e.target.value)} style={{minWidth: '120px'}}>
                            <option value="All">All Bosses</option>
                            {bosses.map(b => <option key={b} value={b}>{b}</option>)}
                        </select>
                    </div>
                    <div className="items-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th>Item</th>
                                    <th>Boss</th>
                                    <th className="hide-mobile">Mission/Location</th>
                                    <th className="hide-mobile">Type</th>
                                    <th>Pts</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.map((item, i) => {
                                    const got = collected.includes(item.itemName);
                                    return (
                                        <tr key={i} className={got ? 'collected' : ''}>
                                            <td className="item-name">{item.itemName}</td>
                                            <td>{item.bossName}</td>
                                            <td className="hide-mobile">{item.mission}</td>
                                            <td className="hide-mobile">{item.type}</td>
                                            <td>{item.points}</td>
                                            <td>
                                                <button className="record-btn" onClick={() => recordDrop(item)}>
                                                    {got ? '+' : 'Record'}
                                                </button>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div className={`panel drops-panel ${activeTab !== 'drops' ? 'hidden' : ''}`}>
                    <h2 className="panel-title hunt-font">COLLECTED DROPS</h2>
                    
                    <div className="twitch-section">
                        {twitchUser 
                            ? <div className="twitch-connected">✓ Connected: {twitchUser}</div>
                            : <button className="twitch-btn" onClick={connectTwitch}>🎮 Connect Twitch</button>
                        }
                    </div>
                    
                    <div className="drops-scroll">
                        <div className="drops-header">
                            <span className="col-session">Session</span>
                            <span className="col-item">Item</span>
                            <span className="col-boss">Boss</span>
                            <span className="col-pts">Pts</span>
                        </div>
                        <div className="drops-list">
                            {drops.length === 0 ? (
                                <p className="no-drops">No drops recorded yet</p>
                            ) : drops.map(d => (
                                <div 
                                    key={d.id} 
                                    className="drop-row" 
                                    onClick={() => setSelectedDrop(d.id)}
                                    style={{background: selectedDrop === d.id ? 'rgba(255,198,0,0.2)' : 'transparent'}}
                                >
                                    <span className="col-session">{d.submitted ? '✓' : d.clipUrl ? '●' : ''} {formatTime(d.sessionTime).slice(0,5)}</span>
                                    <span className="col-item">{d.itemName}</span>
                                    <span className="col-boss">{d.bossName}</span>
                                    <span className="col-pts">{d.points}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {currentDrop && (
                        <div className="clip-section">
                            <div className="clip-title">Clip for: {currentDrop.itemName}</div>
                            <div className="clip-row">
                                <input 
                                    className="clip-input" 
                                    placeholder="Paste clip URL..." 
                                    value={currentDrop.clipUrl} 
                                    onChange={e => setClip(currentDrop.id, e.target.value)} 
                                />
                            </div>
                            <div style={{fontSize: '11px', color: currentDrop.submitted ? 'var(--gold)' : currentDrop.clipUrl ? '#4caf50' : '#ff9800'}}>
                                {currentDrop.submitted ? '✓ Submitted' : currentDrop.clipUrl ? '● Clip linked' : '⚠ No clip'}
                            </div>
                        </div>
                    )}
                    
                    {noClips.length > 0 && <p className="warning">⚠ {noClips.length} drop(s) missing clips</p>}
                    
                    <div className="action-buttons">
                        {twitchUser && <button className="action-btn" onClick={createClip}>Create Clip</button>}
                        <button className="action-btn remove" onClick={() => selectedDrop && removeDrop(selectedDrop)} disabled={!selectedDrop}>Remove Selected</button>
                    </div>
                    
                    <div className="export-section">
                        <button className="export-btn import" onClick={handleImportClick}>📂 Import</button>
                        <button className="export-btn" onClick={exportJSON}>Export JSON</button>
                        <button className="export-btn" onClick={exportCSV}>Export CSV</button>
                        <button className="export-btn" onClick={clearAll}>Clear</button>
                    </div>
                    <p className="import-info">Import backups from desktop app or previous web sessions</p>
                </div>
                
                {/* Submit Panel */}
                <div className={`panel drops-panel ${activeTab !== 'submit' ? 'hidden' : ''}`}>
                    <h2 className="panel-title hunt-font">SUBMIT TO BL4HUNT.COM</h2>
                    
                    <div style={{padding: '15px', color: 'var(--white)', fontSize: '13px', lineHeight: '1.8'}}>
                        <div style={{display: 'flex', justifyContent: 'space-around', marginBottom: '20px', textAlign: 'center'}}>
                            <div>
                                <div style={{color: 'var(--gold)', fontSize: '24px', fontFamily: 'Bebas Neue'}}>{submittedDrops.length}</div>
                                <div style={{color: 'var(--yellow)', fontSize: '11px'}}>SUBMITTED</div>
                            </div>
                            <div>
                                <div style={{color: '#4caf50', fontSize: '24px', fontFamily: 'Bebas Neue'}}>{readyDrops.length}</div>
                                <div style={{color: 'var(--yellow)', fontSize: '11px'}}>READY</div>
                            </div>
                            <div>
                                <div style={{color: '#ff9800', fontSize: '24px', fontFamily: 'Bebas Neue'}}>{missingClipDrops.length}</div>
                                <div style={{color: 'var(--yellow)', fontSize: '11px'}}>MISSING CLIPS</div>
                            </div>
                        </div>
                        
                        {!submitMode ? (
                            <div>
                                <p style={{marginBottom: '8px'}}><strong style={{color: 'var(--gold)'}}>How submit works:</strong></p>
                                <p>1. Click Start - opens step-by-step guide</p>
                                <p>2. For each drop, open the item list page and click Claim</p>
                                <p>3. Paste the clip URL (auto-copied) and submit</p>
                                <p>4. Mark as done, move to next drop</p>
                                <p style={{marginTop: '12px', color: 'var(--yellow)'}}>Make sure you are <strong>logged in</strong> to bl4hunt.com first!</p>
                                
                                <p style={{marginTop: '15px', color: 'var(--yellow)', fontSize: '11px'}}>
                                    ✓ = Submitted &nbsp;&nbsp; ● = Has clip &nbsp;&nbsp; No icon = Missing clip
                                </p>
                            </div>
                        ) : (
                            <div style={{background: 'rgba(0,0,0,0.3)', borderRadius: '8px', padding: '15px', border: '2px solid var(--gold)'}}>
                                <div style={{color: 'var(--gold)', fontSize: '14px', fontFamily: 'Bebas Neue', marginBottom: '10px'}}>
                                    DROP {submitIndex + 1} OF {submitList.length}
                                </div>
                                
                                <div style={{marginBottom: '12px'}}>
                                    <div style={{color: 'var(--gold)', fontSize: '18px', fontWeight: 'bold'}}>{submitList[submitIndex]?.itemName}</div>
                                    <div style={{color: 'var(--yellow)', fontSize: '12px'}}>Boss: {submitList[submitIndex]?.bossName}</div>
                                    <div style={{color: 'var(--yellow)', fontSize: '12px'}}>Points: {submitList[submitIndex]?.points} | Type: {submitList[submitIndex]?.type}</div>
                                </div>
                                
                                <div style={{background: 'rgba(76,175,80,0.2)', border: '1px solid #4caf50', borderRadius: '6px', padding: '8px', marginBottom: '12px', fontSize: '12px', color: '#4caf50'}}>
                                    Clip URL copied to clipboard!
                                </div>
                                
                                <div style={{marginBottom: '12px', fontSize: '12px'}}>
                                    <p>1. <a href="https://www.bl4hunt.com/item-list/" target="_blank" rel="noopener noreferrer" style={{color: 'var(--gold)', textDecoration: 'underline'}}>Open Item List Page</a></p>
                                    <p>2. Find "<strong>{submitList[submitIndex]?.itemName}</strong>" and click Claim</p>
                                    <p>3. Paste clip URL (Ctrl+V) and submit</p>
                                </div>
                                
                                <div style={{display: 'flex', gap: '8px'}}>
                                    <button onClick={() => submitNext(true)} style={{flex: 1, padding: '10px', background: '#4caf50', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontFamily: 'Bebas Neue', fontSize: '14px', letterSpacing: '1px'}}>
                                        CLAIMED - NEXT
                                    </button>
                                    <button onClick={() => submitNext(false)} style={{padding: '10px 15px', background: '#ff9800', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '12px'}}>
                                        Skip
                                    </button>
                                    <button onClick={cancelSubmit} style={{padding: '10px 15px', background: '#f44336', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '12px'}}>
                                        Stop
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    {!submitMode && readyDrops.length > 0 && (
                        <div style={{padding: '0 15px 15px'}}>
                            <button onClick={startSubmit} style={{width: '100%', padding: '14px', fontSize: '16px', fontFamily: 'Bebas Neue', letterSpacing: '2px', background: '#4caf50', border: 'none', borderRadius: '6px', color: 'white', cursor: 'pointer'}}>
                                SUBMIT {readyDrops.length} DROPS TO BL4HUNT.COM
                            </button>
                        </div>
                    )}
                    
                    <div style={{padding: '0 15px'}}>
                        <div className="export-section">
                            <button className="export-btn" onClick={exportJSON}>Export JSON</button>
                            <button className="export-btn" onClick={exportCSV}>Export CSV</button>
                        </div>
                    </div>
                </div>
            </div>
            
            {/* Source Selection Modal */}
            {modal && (
                <div className="modal-overlay" onClick={() => setModal(null)}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <h3 className="modal-title hunt-font">SELECT SOURCE</h3>
                        <p style={{color: 'var(--white)', marginBottom: '10px'}}>{modal.itemName} drops from:</p>
                        <div className="source-list">
                            {ITEMS.filter(i => i.itemName === modal.itemName).map((item, i) => (
                                <div key={i} className={`source-option ${selectedSource === item.bossName ? 'selected' : ''}`} onClick={() => setSelectedSource(item.bossName)}>
                                    <div className="source-name">{item.bossName}</div>
                                    <div className="source-location">{item.mission}</div>
                                </div>
                            ))}
                        </div>
                        <div className="modal-buttons">
                            <button className="modal-btn secondary" onClick={() => setModal(null)}>Cancel</button>
                            <button className="modal-btn primary hunt-font" onClick={() => addDrop(modal, selectedSource)}>RECORD DROP</button>
                        </div>
                    </div>
                </div>
            )}
            
            {/* Import Modal */}
            {importModal && (
                <div className="modal-overlay" onClick={() => setImportModal(null)}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <h3 className="modal-title hunt-font">IMPORT BACKUP</h3>
                        <div className="import-preview">
                            <strong>Player:</strong> {importModal.player || importModal.Player || importModal.PlayerName || 'Unknown'}<br/>
                            <strong>Drops:</strong> {importModal.drops?.length || 0}<br/>
                            <strong>Score:</strong> {importModal.score || importModal.TotalScore || importModal.drops?.reduce((s,d) => s + (d.points || d.Points || 1), 0) || 0}<br/>
                            <strong>Timer:</strong> {formatTime(importModal.seconds || importModal.timerSeconds || importModal.TimerSeconds || 0)}<br/>
                            <strong>Clips:</strong> {importModal.drops?.filter(d => d.clipUrl || d.ClipUrl || d.clip_url).length || 0} attached<br/>
                            {importModal.exported && <><strong>Exported:</strong> {new Date(importModal.exported).toLocaleString()}</>}
                        </div>
                        <p style={{color: 'var(--yellow)', fontSize: '12px', marginTop: '10px'}}>
                            Choose how to import:
                        </p>
                        <div className="modal-buttons">
                            <button className="modal-btn secondary" onClick={() => setImportModal(null)}>Cancel</button>
                            <button className="modal-btn secondary" onClick={() => confirmImport('merge')}>Merge</button>
                            <button className="modal-btn primary" onClick={() => confirmImport('replace')}>Replace All</button>
                        </div>
                        <p style={{color: 'var(--yellow)', fontSize: '11px', marginTop: '10px'}}>
                            <strong>Replace:</strong> Clears current data and loads backup<br/>
                            <strong>Merge:</strong> Adds backup drops to current session
                        </p>
                    </div>
                </div>
            )}
            
            {/* Help/Instructions Modal */}
            {showHelp && (
                <div className="modal-overlay" onClick={() => { setShowHelp(false); localStorage.setItem('huntSeenHelp', 'true'); }}>
                    <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth: '500px'}}>
                        <h3 className="modal-title hunt-font">🎯 WELCOME TO THE HUNT TRACKER</h3>
                        
                        <div style={{color: 'var(--white)', fontSize: '13px', lineHeight: '1.6'}}>
                            <p style={{marginBottom: '12px'}}><strong style={{color: 'var(--gold)'}}>How to use:</strong></p>
                            
                            <p style={{marginBottom: '8px'}}>
                                <strong>1.</strong> Enter your <strong style={{color: 'var(--gold)'}}>Player Name</strong> at the top
                            </p>
                            
                            <p style={{marginBottom: '8px'}}>
                                <strong>2.</strong> Click <strong style={{color: 'var(--gold)'}}>START</strong> when you begin your run
                            </p>
                            
                            <p style={{marginBottom: '8px'}}>
                                <strong>3.</strong> When you get a drop, find it in the list and click <strong style={{color: 'var(--gold)'}}>Record</strong>
                            </p>
                            
                            <p style={{marginBottom: '8px'}}>
                                <strong>4.</strong> Go to <strong style={{color: 'var(--gold)'}}>Clips</strong> tab to add clip URLs for each drop
                            </p>
                            
                            <p style={{marginBottom: '12px'}}>
                                <strong>5.</strong> Use <strong style={{color: 'var(--gold)'}}>Export</strong> to save your progress
                            </p>
                            
                            <hr style={{border: 'none', borderTop: '1px solid var(--gold)', margin: '15px 0'}} />
                            
                            <p style={{marginBottom: '8px'}}><strong style={{color: 'var(--gold)'}}>Tips:</strong></p>
                            
                            <p style={{marginBottom: '8px'}}>
                                🎮 <strong>Connect Twitch</strong> to create clips directly from the tracker
                            </p>
                            
                            <p style={{marginBottom: '8px'}}>
                                📂 <strong>Import</strong> backups from the desktop app or previous sessions
                            </p>
                            
                            <p style={{marginBottom: '8px'}}>
                                💾 Your data saves <strong>automatically</strong> in your browser
                            </p>
                            
                            <p style={{marginBottom: '8px'}}>
                                🔍 Use <strong>Search</strong> to quickly find items
                            </p>
                        </div>
                        
                        <div className="modal-buttons" style={{marginTop: '20px'}}>
                            <button 
                                className="modal-btn primary hunt-font" 
                                onClick={() => { setShowHelp(false); localStorage.setItem('huntSeenHelp', 'true'); }}
                            >
                                LET'S HUNT!
                            </button>
                        </div>
                        
                        <p style={{color: 'var(--yellow)', fontSize: '11px', marginTop: '15px', textAlign: 'center'}}>
                            Click the <strong>?</strong> button anytime to see this again
                        </p>
                    </div>
                </div>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
